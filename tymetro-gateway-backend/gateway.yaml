gateway:
  id: GW-TAU-01
  name: 桃園捷運 冰水機房 Gateway 01
  location: 桃機 T2 冰水主機房
  poll_interval_ms: 1000
network:
  central_server:
    host: 10.200.1.50
    port: 9001
    tls_enabled: false
    reconnect_delay_sec: 5
  ipc_socket_path: /tmp/hvac_ipc.sock
database:
  db_path: gateway.db
  batch_flush_sec: 10
equipments:
- id: PFC11011
  name: PFC11011
  ip: 192.168.16.91
  port: 502
  slave_id: 1
  registers:
  - code: D40001
    name: 主控制模式 (DI 1/2)
    address: 40001
    type: INT16
    scale: 1.0
    unit: N/A
    sensor_type: REAL_TIME
    value: 2
  - code: D40009
    name: 氨氣感測器值
    address: 40009
    type: INT16
    scale: 1.0
    unit: ppm
    sensor_type: REAL_TIME
    value: 0
  - code: D40010
    name: 擋板運行模式選擇
    address: 40010
    type: INT16
    scale: 1.0
    unit: N/A
    sensor_type: REAL_TIME
    value: 0
  - code: D40011
    name: 新鮮空氣擋板位置 (回饋)
    address: 40011
    type: INT16
    scale: 1.0
    unit: '%'
    sensor_type: REAL_TIME
    value: 0
  - code: D40012
    name: 緊急空氣擋板位置 (回饋)
    address: 40012
    type: INT16
    scale: 1.0
    unit: N/A
    sensor_type: REAL_TIME
    value: 0
  - code: D40013
    name: 回風擋板位置 (回饋)
    address: 40013
    type: INT16
    scale: 1.0
    unit: N/A
    sensor_type: REAL_TIME
    value: 0
  - code: D40014
    name: 排氣擋板位置 (回饋)
    address: 40014
    type: INT16
    scale: 1.0
    unit: N/A
    sensor_type: REAL_TIME
    value: 0
