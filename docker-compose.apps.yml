# Application services only (Backend & Frontend)
networks:
  tymetro-net:
    external: true

services:
  # 5. Backend (FastAPI Application)
  backend:
    build:
      context: ./tymetro-gateway-backend
      dockerfile: Dockerfile
    container_name: tymetro-backend
    restart: always
    environment:
      - APP_MODE=production
      - SERVER_HOST=0.0.0.0
      - SERVER_PORT=5400
      - MQTT_BROKER_HOST=mosquitto
      - MQTT_BROKER_PORT=1883
      - REDIS_HOST=redis
      - REDIS_PORT=6379
    deploy:
      resources:
        limits:
          memory: 384M
    networks:
      - tymetro-net

  # 6. Frontend (Vue 3 Single Page Application)
  frontend:
    build:
      context: ./tymetro-gateway-frotend
      dockerfile: Dockerfile
    container_name: tymetro-frontend
    restart: always
    deploy:
      resources:
        limits:
          memory: 64M
    networks:
      - tymetro-net
