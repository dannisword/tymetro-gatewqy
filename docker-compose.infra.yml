# Base Docker network and shared definitions
networks:
  tymetro-net:
    name: tymetro-net
    driver: bridge

volumes:
  mosquitto_data:
  mosquitto_log:
  redis_data:
  portainer_data:

services:
  # 1. Mosquitto (MQTT Broker)
  mosquitto:
    image: eclipse-mosquitto:2.0
    container_name: tymetro-mosquitto
    restart: always
    ports:
      - "1883:1883"
      - "9001:9001"
    volumes:
      - ./mosquitto/config/mosquitto.conf:/mosquitto/config/mosquitto.conf
      - mosquitto_data:/mosquitto/data
      - mosquitto_log:/mosquitto/log
    deploy:
      resources:
        limits:
          memory: 128M
    networks:
      - tymetro-net

  # 2. Portainer CE (Docker Management GUI)
  portainer:
    image: portainer/portainer-ce:latest
    container_name: tymetro-portainer
    restart: always
    ports:
      - "9443:9443"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - portainer_data:/data
    deploy:
      resources:
        limits:
          memory: 256M
    networks:
      - tymetro-net

  # 3. Redis (Cache & In-memory State)
  redis:
    image: redis:7-alpine
    container_name: tymetro-redis
    restart: always
    command: redis-server --appendonly yes --maxmemory 100mb --maxmemory-policy allkeys-lru
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    deploy:
      resources:
        limits:
          memory: 128M
    networks:
      - tymetro-net

  # 4. Nginx Reverse Proxy & Entrypoint Gateway
  nginx:
    image: nginx:alpine
    container_name: tymetro-nginx
    restart: always
    ports:
      - "80:80"
    volumes:
      - ./nginx/conf.d:/etc/nginx/conf.d:ro
    deploy:
      resources:
        limits:
          memory: 64M
    networks:
      - tymetro-net
